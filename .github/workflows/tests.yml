# This workflow performs automated testing and linting on every push to any branch.
name: test

on:
  push:
    # Trigger: Executes whenever code is pushed to any branch ('*').
    branches:
      - '*'

jobs:
  test:
    # Runner: Executes on the latest Ubuntu virtual machine.
    runs-on: ubuntu-latest
    strategy:
      # Matrix: Allows running tests across multiple versions (currently configured for Python 3.11).
      matrix:
        python-version: [3.11]
      # Execution Control: Ensures only one test job runs at a time to manage resources.
      max-parallel: 1

    steps:
    # Step 1: Checks out the source code from the repository.
    - uses: actions/checkout@v2

    # Step 2: Sets up a Conda environment using the project's 'environment.yaml' file.
    - name: Set up conda environment
      uses: conda-incubator/setup-miniconda@v2
      with:
        activate-environment: my-environment
        environment-file: environment.yaml
        python-version: ${{ matrix.python-version }}
        auto-activate-base: true

    # Step 3: Upgrades pip and installs development dependencies from 'dev-requirements.txt'.
    - name: Install dependencies
      shell: bash -l {0} # Ensures commands run within the activated Conda environment.
      run: |
        python -m pip install --upgrade pip
        if [ -f dev-requirements.txt ]; then pip install -r dev-requirements.txt; fi

    # Step 4: Installs the MDCrow package in the current environment.
    - name: Install
      shell: bash -l {0}
      run: |
        pip install .

    # Step 5: Validates code style and formatting using 'pre-commit' hooks.
    - name: Check pre-commit
      run: |
        pip install pre-commit
        # Runs all hooks; if it fails, it prints the git diff to show formatting errors.
        pre-commit run --all-files || ( git status --short ; git diff ; exit 1 )

    # Step 6: Executes the core test suite using pytest.
    - name: Run Test
      shell: bash -l {0}
      env:
        # Passes necessary API keys for the Agent to interact with LLMs and research databases.
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
      run: |
         # Runs pytest while skipping tests explicitly marked with the "skip" decorator.
         pytest -m "not skip" tests
